<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EMDTrack">
<link rel="manifest" href="emd-manifest.json">
<title>EMDTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --mono:'JetBrains Mono',monospace;--sans:'Plus Jakarta Sans',system-ui,sans-serif;--title:'Syne',system-ui,sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"]{
  --bg:#0f0f0e;--surface:#1a1a18;--card:#1a1a18;--card2:#242422;
  --border:#2a2a28;--border2:#3a3a36;
  --text:#f0f0ec;--dim:#8a8a80;--muted:#242422;
  --accent:#4d80e6;--accent2:#6b9ef8;--glow:rgba(77,128,230,.2);
  --green:#2ea878;--red:#e05a4e;--yellow:#d4900a;--purple:#a06cd5;
  --grad1:rgba(46,168,120,.08);--grad2:rgba(77,128,230,.06);--grad3:rgba(160,108,213,.04);
}
[data-theme="light"]{
  --bg:#f5f5f3;--surface:#ffffff;--card:#ffffff;--card2:#f0f0ee;
  --border:#e4e4e0;--border2:#c8c8be;
  --text:#0a0a0a;--dim:#6a6a60;--muted:#f0f0ee;
  --accent:#1a56db;--accent2:#2563eb;--glow:rgba(26,86,219,.15);
  --green:#047857;--red:#c0392b;--yellow:#b45309;--purple:#7B2FBE;
  --grad1:rgba(4,120,87,.05);--grad2:rgba(26,86,219,.05);--grad3:rgba(123,47,190,.03);
}
html,body{height:100%;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background .2s,color .2s;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%,var(--grad1) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 90%,var(--grad2) 0%,transparent 55%),
    radial-gradient(ellipse 30% 30% at 10% 60%,var(--grad3) 0%,transparent 50%);}


/* ── DESKTOP LAYOUT ─────────────────────────────────── */
.page-wrap{max-width:960px;margin:0 auto;width:100%;}
@media(min-width:768px){
  body{font-size:15px;}
  main{padding:20px 28px;padding-bottom:40px;}
  header{padding:0 28px;padding-top:var(--safe-top);}
  .hdr-row1{height:56px;gap:10px;}
  .hdr-row2{height:44px;padding-bottom:8px;}
  .stats-row{gap:10px;margin-bottom:18px;}
  .stat-chip{padding:10px 16px;font-size:12px;border-radius:12px;}
  .stat-chip b{font-size:15px;}
  .filter-tabs{gap:8px;margin-bottom:16px;}
  .ftab{font-size:12px;padding:7px 18px;}
  .emd-list{gap:12px;}
  .emd-card{border-radius:16px;}
  .emd-card-header{padding:16px 18px;}
  .emd-no{font-size:16px;}
  .emd-vendor-row{gap:8px;}
  .emd-vendor-name{font-size:12px;}
  .emd-vendor-amt{font-size:12px;}
  .emd-history{padding:0 18px 16px;}
  .emd-entry{padding:13px 15px;border-radius:12px;}
  .emd-entry-amount{font-size:14px;}
  .emd-entry-date{font-size:12px;}
  .emd-entry-notes{font-size:13px;}
  .emd-add-entry{padding:12px 15px;font-size:14px;}
  .modal{border-radius:16px;max-width:600px;margin:auto;}
  .overlay{align-items:center;}
  .mt{font-size:18px;}
  .fi{font-size:15px;padding:12px 14px;}
  .fl{font-size:11px;}
  .fgrp{margin-bottom:16px;}
  .btn-s,.btn-c{font-size:15px;padding:11px 24px;}
  .btn-add{padding:9px 20px;font-size:14px;}
  .btn-sync,.btn-theme,.btn-back{padding:8px 14px;font-size:13px;}
  .brand{font-size:17px;}
  .brand-pip{width:32px;height:32px;font-size:16px;}
  .hdr-search{font-size:15px;padding:10px 15px;}
  .sopt{font-size:12px;padding:12px 10px;}
  .sync-step-body{font-size:13px;}
  .emd-amount{font-size:14px;}
  .emd-status{font-size:11px;padding:4px 12px;}
  .emd-history-title{font-size:11px;}
}

/* HEADER */
header{position:sticky;top:0;z-index:50;
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-bottom:1px solid var(--border);padding:0 16px;padding-top:var(--safe-top);
  transition:background .2s,border-color .2s;}
[data-theme="dark"] header{background:rgba(15,15,14,.92);box-shadow:0 1px 20px rgba(0,0,0,.3);}
[data-theme="light"] header{background:rgba(245,245,243,.94);box-shadow:0 1px 12px rgba(0,0,0,.06);}
.hdr-row1{display:flex;align-items:center;height:48px;gap:8px;}
.hdr-row2{display:flex;align-items:center;height:40px;gap:6px;padding-bottom:6px;}
.btn-back{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border2);
  border-radius:9px;padding:7px 11px;color:var(--dim);font-family:var(--sans);font-size:12px;font-weight:600;
  cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none;text-decoration:none;transition:all .15s;}
.btn-back:hover{color:var(--green);border-color:rgba(46,168,120,.4);}
.brand{display:flex;align-items:center;gap:9px;flex:1;min-width:0;font-family:var(--title);font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.2px;}
.brand-pip{width:28px;height:28px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--green),#34d399);
  display:flex;align-items:center;justify-content:center;font-size:13px;
  box-shadow:0 2px 10px rgba(46,168,120,.35);}
.hdr-search{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:8px 13px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;-webkit-appearance:none;
  transition:border-color .15s,box-shadow .15s,background .2s;}
.hdr-search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}
.hdr-search::placeholder{color:var(--dim);}
.btn-theme{width:32px;height:32px;border-radius:9px;border:1px solid var(--border2);background:var(--surface);
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;
  transition:background .2s,border-color .2s;-webkit-appearance:none;}
.btn-theme:active{transform:scale(.9);}
/* SYNC */
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--border2);transition:background .3s;}
.sync-dot.ok{background:var(--green);box-shadow:0 0 6px rgba(46,168,120,.6);}
.sync-dot.err{background:var(--red);box-shadow:0 0 6px rgba(224,90,78,.6);}
.sync-dot.busy{background:var(--yellow);box-shadow:0 0 6px rgba(212,144,10,.6);animation:pulse .8s infinite;}
.btn-sync{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border2);
  border-radius:9px;padding:7px 11px;color:var(--dim);font-family:var(--sans);font-size:12px;font-weight:600;
  cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none;transition:all .15s;}
.btn-sync.ok{color:var(--green);border-color:rgba(46,168,120,.4);}
.btn-add{background:var(--green);border:none;border-radius:9px;
  padding:8px 16px;color:#fff;font-family:var(--sans);font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none;margin-left:auto;
  box-shadow:0 2px 10px rgba(46,168,120,.3);transition:opacity .15s,transform .1s;}
.btn-add:active{opacity:.85;transform:scale(.97);}
/* MAIN */
main{padding:16px;padding-bottom:calc(30px + var(--safe-bot));}
/* STATS */
.stats-row{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.stats-row::-webkit-scrollbar{display:none;}
.stat-chip{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:9px 14px;font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap;flex-shrink:0;
  transition:background .2s;}
.stat-chip b{font-size:14px;color:var(--text);}
.stat-chip.green b{color:var(--green);}
.stat-chip.amber b{color:var(--yellow);}
.stat-chip.blue b{color:var(--accent);}
.stat-chip.red b{color:var(--red);}
/* FILTER TABS */
.filter-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-tabs::-webkit-scrollbar{display:none;}
.ftab{background:var(--surface);border:1px solid var(--border2);border-radius:20px;
  padding:6px 14px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--dim);
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.ftab.active{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 2px 10px rgba(46,168,120,.3);}
/* EMD CARDS */
.emd-list{display:flex;flex-direction:column;gap:10px;}
.emd-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .15s;}
[data-theme="light"] .emd-card{box-shadow:0 1px 6px rgba(0,0,0,.05);}
.emd-card:hover{border-color:var(--border2);}
.emd-card-header{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;}
.emd-no{font-family:var(--title);font-size:14px;font-weight:800;color:var(--text);}
.emd-vendor{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:3px;line-height:1.5;}
.emd-vendor-row{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:nowrap;}
.emd-vendor-name{font-family:var(--mono);font-size:11px;color:var(--dim);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.emd-vendor-amt{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--green);white-space:nowrap;flex-shrink:0;}
.emd-amount{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green);white-space:nowrap;}
.emd-status{font-size:10px;font-weight:700;font-family:var(--mono);border-radius:20px;padding:3px 10px;white-space:nowrap;}
.emd-status.submitted{background:rgba(77,128,230,.12);color:var(--accent);border:1px solid rgba(77,128,230,.28);}
.emd-status.refund-pending{background:rgba(212,144,10,.12);color:var(--yellow);border:1px solid rgba(212,144,10,.28);}
.emd-status.refunded{background:rgba(46,168,120,.12);color:var(--green);border:1px solid rgba(46,168,120,.25);}
.emd-chevron{color:var(--dim);font-size:16px;flex-shrink:0;transition:transform .2s;}
.emd-card.expanded .emd-chevron{transform:rotate(180deg);}
/* EMD HISTORY */
.emd-history{border-top:1px solid var(--border);padding:0 14px 12px;}
.emd-history-title{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  font-family:var(--mono);color:var(--green);padding:10px 0 8px;}
.emd-entry{display:flex;flex-direction:column;gap:4px;background:var(--card2);border:1px solid var(--border);
  border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:border-color .15s;}
.emd-entry:last-child{margin-bottom:0;}
.emd-entry:hover{border-color:var(--border2);}
.emd-entry-row{display:flex;align-items:center;gap:8px;}
.emd-entry-amount{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);}
.emd-entry-date{font-family:var(--mono);font-size:11px;color:var(--dim);flex:1;}
.emd-entry-notes{font-size:12px;color:var(--dim);line-height:1.4;margin-top:2px;}
.emd-add-entry{display:flex;align-items:center;gap:6px;background:transparent;border:1px dashed var(--border2);
  border-radius:10px;padding:10px 13px;color:var(--dim);font-size:13px;font-family:var(--sans);font-weight:600;
  cursor:pointer;width:100%;margin-top:4px;transition:all .15s;}
.emd-add-entry:hover{border-color:var(--green);color:var(--green);}
/* EMPTY */
.empty{text-align:center;padding:70px 20px;color:var(--dim);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.25;}
.empty-title{font-family:var(--title);font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px;}
.empty-sub{font-size:13px;}
/* MODAL */
.overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;justify-content:flex-end;
  background:rgba(0,0,0,0);pointer-events:none;transition:background .25s;}
.overlay.open{background:rgba(0,0,0,.5);pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border2);
  border-radius:22px 22px 0 0;padding:20px 20px calc(20px + var(--safe-bot));
  max-height:92vh;overflow-y:auto;width:100%;max-width:600px;margin:0 auto;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);}
.overlay.open .modal{transform:translateY(0);}
[data-theme="dark"] .modal{box-shadow:0 -16px 60px rgba(0,0,0,.4);}
[data-theme="light"] .modal{box-shadow:0 -8px 40px rgba(0,0,0,.1);}
.modal-drag{width:40px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 20px;}
.mt{font-family:var(--title);font-size:16px;font-weight:800;color:var(--text);}
.xbtn{background:var(--card2);border:1px solid var(--border2);border-radius:8px;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--dim);-webkit-appearance:none;}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.fi{background:var(--card2);border:1px solid var(--border2);border-radius:11px;padding:11px 13px;
  color:var(--text);font-family:var(--sans);font-size:15px;outline:none;width:100%;-webkit-appearance:none;
  transition:border-color .15s,box-shadow .15s,background .2s;}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}
.fi::placeholder{color:var(--dim);}
input[type="date"].fi{color-scheme:dark;}
[data-theme="light"] input[type="date"].fi{color-scheme:light;}
.fl{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);margin-bottom:6px;display:block;font-family:var(--mono);}
.fgrp{margin-bottom:14px;}
.fsec{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--green);
  font-family:var(--mono);padding:12px 0 8px;border-top:1px solid var(--border);}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}
.btn-c{background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:10px 18px;
  color:var(--dim);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;-webkit-appearance:none;}
.btn-s{background:var(--green);border:none;border-radius:10px;
  padding:10px 20px;color:#fff;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;-webkit-appearance:none;
  box-shadow:0 2px 10px rgba(46,168,120,.25);transition:transform .1s,opacity .15s;}
.btn-s:active{transform:scale(.97);}
/* Status selector */
.status-opts{display:flex;gap:8px;flex-wrap:wrap;}
.sopt{flex:1;min-width:90px;border:1px solid var(--border2);border-radius:10px;padding:10px 8px;
  text-align:center;cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:700;
  color:var(--dim);background:var(--surface);transition:all .15s;}
.sopt.active-submitted{background:rgba(77,128,230,.12);border-color:rgba(77,128,230,.4);color:var(--accent);}
.sopt.active-refund-pending{background:rgba(212,144,10,.12);border-color:rgba(212,144,10,.4);color:var(--yellow);}
.sopt.active-refunded{background:rgba(46,168,120,.14);border-color:rgba(46,168,120,.4);color:var(--green);}
/* SYNC MODAL */
.sync-url-box{background:var(--card2);border:1px solid var(--border2);border-radius:10px;
  padding:10px 13px;font-size:11px;font-family:var(--mono);color:var(--dim);line-height:1.6;
  overflow-x:auto;white-space:pre;cursor:pointer;position:relative;margin-bottom:10px;}
.btn-push{background:var(--green);border:none;border-radius:10px;
  padding:11px 0;color:#fff;font-family:var(--sans);font-size:14px;font-weight:700;
  cursor:pointer;width:100%;margin-bottom:8px;}
.btn-pull{background:var(--surface);border:1px solid var(--border2);border-radius:10px;
  padding:11px 0;color:var(--dim);font-family:var(--sans);font-size:14px;font-weight:600;
  cursor:pointer;width:100%;margin-bottom:8px;}
.sync-step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
.sync-step-num{width:22px;height:22px;border-radius:50%;background:rgba(46,168,120,.12);
  border:1px solid rgba(46,168,120,.28);display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--green);flex-shrink:0;margin-top:1px;font-family:var(--mono);}
.sync-step-body{flex:1;font-size:12px;color:var(--dim);line-height:1.5;}
/* TOAST */
.toast{position:fixed;bottom:calc(24px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--text);border:1px solid var(--border2);border-radius:12px;
  padding:10px 18px;font-size:13px;font-weight:500;color:var(--bg);
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:200;
  box-shadow:0 4px 20px rgba(0,0,0,.15);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--red);color:#fff;border-color:var(--red);}
</style>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
</head>
<body>

<header>
<div class="page-wrap">
  <div class="hdr-row1">
    <a class="btn-back" href="index.html">← Back</a>
    <div class="brand"><div class="brand-pip">💰</div>EMDTrack</div>
    <button class="btn-theme" id="btn-theme" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    <button class="btn-add" onclick="openAddTender()">+ Add</button>
  </div>
  <div class="hdr-row2">
    <input class="hdr-search" id="search" placeholder="Search tender, vendor, amount…" oninput="render()">
    <button class="btn-sync" id="btn-sync" onclick="openSync()">
      <span class="sync-dot" id="sync-dot"></span>Sync
    </button>
    <button class="btn-sync" onclick="exportExcel()" title="Export to Excel" style="background:rgba(46,168,120,.1);border-color:rgba(46,168,120,.35);color:var(--green);">⬇ Excel</button>
  </div>
</div>
</header>

<main>
<div class="page-wrap">
  <div class="stats-row">
    <div class="stat-chip blue"><b id="s-total">0</b>&nbsp;Tenders</div>
    <div class="stat-chip green"><b id="s-amount">₹0</b>&nbsp;Total EMD</div>
    <div class="stat-chip amber"><b id="s-pending">0</b>&nbsp;Refund Pending</div>
    <div class="stat-chip blue"><b id="s-submitted">0</b>&nbsp;Submitted</div>
    <div class="stat-chip green"><b id="s-refunded">0</b>&nbsp;Refunded</div>
  </div>

  <div class="filter-tabs" id="filter-tabs">
    <div class="ftab active" data-filter="all" onclick="setFilter('all')">All</div>
    <div class="ftab" data-filter="submitted" onclick="setFilter('submitted')">Submitted</div>
    <div class="ftab" data-filter="refund-pending" onclick="setFilter('refund-pending')">Refund Pending</div>
    <div class="ftab" data-filter="refunded" onclick="setFilter('refunded')">Refunded</div>
  </div>

  <div class="emd-list" id="emd-list"></div>
</div>
</main>

<!-- ADD/EDIT TENDER MODAL -->
<div class="overlay" id="modal-tender">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="mhead">
      <span class="mt" id="tender-modal-title">Add Tender</span>
      <button class="xbtn" onclick="closeM('modal-tender')">✕</button>
    </div>
    <div class="fgrp">
      <label class="fl">Tender Number</label>
      <input class="fi" id="f-no" placeholder="e.g. A75 / 19537" autocomplete="off">
    </div>
    <div class="mfoot">
      <button class="btn-c" onclick="closeM('modal-tender')">Cancel</button>
      <button class="btn-s" onclick="saveTender()">Save</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT EMD ENTRY MODAL -->
<div class="overlay" id="modal-entry">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="mhead">
      <span class="mt" id="entry-modal-title">Add EMD Entry</span>
      <button class="xbtn" onclick="closeM('modal-entry')">✕</button>

    <div class="fgrp">
      <label class="fl">Amount (₹)</label>
      <input class="fi" id="f-amount" type="number" placeholder="e.g. 50000" inputmode="numeric">
    </div>
    <div class="fgrp">
      <label class="fl">Vendor Name</label>
      <input class="fi" id="f-vendor" placeholder="e.g. ABC Pvt Ltd" autocomplete="off">
    </div>
    <div class="fgrp">
      <label class="fl">Payment Date</label>
      <input class="fi" id="f-date" type="date">

        <div class="sopt" data-val="submitted" onclick="selectStatus('submitted')">Submitted</div>
        <div class="sopt" data-val="refund-pending" onclick="selectStatus('refund-pending')">Refund Pending</div>
        <div class="sopt" data-val="refunded" onclick="selectStatus('refunded')">Refunded</div>

      <label class="fl">Notes (optional)</label>

      <button class="btn-c" id="entry-del-btn" onclick="deleteEntry()" style="margin-right:auto;color:#f87171;border-color:rgba(239,68,68,.3);display:none">Delete</button>
      <button class="btn-c" onclick="closeM('modal-entry')">Cancel</button>
      <button class="btn-s" onclick="saveEntry()">Save</button>

</div>

<!-- SYNC MODAL -->
<div class="overlay" id="modal-sync">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="mhead">
      <span class="mt">☁ Cloud Sync</span>
      <button class="xbtn" onclick="closeM('modal-sync')">✕</button>
    </div>
    <div id="sync-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── THEME ─────────────────────────────────────────────
(function(){
  const saved = localStorage.getItem('tt_theme');
  const sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  const theme = saved || sys;
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('btn-theme');
  if(btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
})();
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('tt_theme', next);
  document.getElementById('btn-theme').textContent = next === 'dark' ? '☀️' : '🌙';
}

// ── CONSTANTS ──────────────────────────────────────────
const KEY      = 'emd_v1';
const SYNC_KEY = 'emd_sync_url';

// ── STATE ──────────────────────────────────────────────
// Data structure:
// tenders = [{id, no, entries:[{id, amount, vendor, date, status, notes}]}]
let tenders = [];
let syncUrl = localStorage.getItem(SYNC_KEY) || '';

const APPS_SCRIPT = `function doGet(e) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sh = ss.getSheetByName('EMDData');
  if(!sh) sh = ss.insertSheet('EMDData');
  var cb = e.parameter.cb || 'callback';
  var action = e.parameter.action || 'read';
  if(action === 'chunk') {
    var i = parseInt(e.parameter.i || '0');
    sh.getRange(2+i, 2).setValue(e.parameter.d || '');
    sh.getRange(1, 2).setValue(e.parameter.total || '1');
    return ContentService.createTextOutput(cb+'({"ok":true})')
      .setMimeType(ContentService.MimeType.JAVASCRIPT);
  }
  if(action === 'commit') {
    var total = parseInt(sh.getRange(1,2).getValue() || '1');
    var parts = [];
    for(var i=0; i<total; i++) parts.push(sh.getRange(2+i,2).getValue()||'');
    sh.getRange(1,1).setValue(parts.join(''));
    sh.getRange(1,2,total+1,1).clearContent();
    return ContentService.createTextOutput(cb+'({"ok":true})')
      .setMimeType(ContentService.MimeType.JAVASCRIPT);
  }
  var data = sh.getRange(1,1).getValue() || '[]';
  return ContentService.createTextOutput(cb+'('+data+')')
    .setMimeType(ContentService.MimeType.JAVASCRIPT);
}`;
let activeFilter = 'all';
let editingTenderId = null;   // for tender modal
let editingEntryTenderId = null; // for entry modal
let editingEntryId = null;
let selectedStatus = 'submitted';
let expandedCards = new Set();

// ── HELPERS ───────────────────────────────────────────
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtAmount(n){
  if(!n && n!==0) return '—';
  const num = parseFloat(n);
  if(isNaN(num)) return '—';
  return '₹' + num.toLocaleString('en-IN');
}
function fmtDate(d){
  if(!d) return '—';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}
function statusLabel(s){
  if(s==='submitted') return 'Submitted';
  if(s==='refund-pending') return 'Refund Pending';
  if(s==='refunded') return 'Refunded';
  return s;
}
// Get latest entry for a tender (for summary display)
function latestEntry(t){
  if(!t.entries || !t.entries.length) return null;
  return t.entries[t.entries.length-1];
}
// Total active EMD amount (submitted + refund-pending)
function activeAmount(t){
  if(!t.entries) return 0;
  return t.entries.filter(e => e.status !== 'refunded').reduce((s,e) => s + (parseFloat(e.amount)||0), 0);
}

// ── LOAD / SAVE ───────────────────────────────────────
function load(){
  try{ tenders = JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ tenders=[]; }
  render();
}
function save(){ localStorage.setItem(KEY, JSON.stringify(tenders)); }

// ── FILTER ────────────────────────────────────────────
function setFilter(f){
  activeFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.toggle('active', t.dataset.filter === f));
  render();
}

// ── RENDER ────────────────────────────────────────────
function render(){
  const q = (document.getElementById('search').value||'').toLowerCase();
  const list = document.getElementById('emd-list');

  // Filter tenders
  let filtered = tenders.filter(t => {
    if(q){
      const matchNo = t.no.toLowerCase().includes(q);
      const matchEntry = (t.entries||[]).some(e =>
        (e.vendor||'').toLowerCase().includes(q) ||
        (e.notes||'').toLowerCase().includes(q) ||
        (e.amount||'').toString().includes(q)
      );
      if(!matchNo && !matchEntry) return false;
    }
    if(activeFilter === 'all') return true;
    // Check if any entry matches the filter status
    return t.entries && t.entries.some(e => e.status === activeFilter);
  });

  // Stats
  let totalActive = 0, pendingCount = 0, submittedCount = 0, refundedCount = 0;
  tenders.forEach(t => {
    // Sum only the latest entry per vendor (not all entries)
    const vendorMap = {};
    (t.entries||[]).forEach(e => { if(e.vendor) vendorMap[e.vendor] = e; });
    Object.values(vendorMap).forEach(e => {
      if(e.status !== 'refunded') totalActive += (parseFloat(e.amount)||0);
    });
    if(t.entries) t.entries.forEach(e => {
      if(e.status==='refund-pending') pendingCount++;
      if(e.status==='submitted') submittedCount++;
      if(e.status==='refunded') refundedCount++;
    });
  });
  document.getElementById('s-total').textContent = tenders.length;
  document.getElementById('s-amount').textContent = fmtAmount(totalActive);
  document.getElementById('s-pending').textContent = pendingCount;
  document.getElementById('s-submitted').textContent = submittedCount;
  document.getElementById('s-refunded').textContent = refundedCount;

  if(!filtered.length){
    list.innerHTML = '<div class="empty"><div class="empty-icon">💰</div><div class="empty-title">'+(q?'No results':'No EMD records yet')+'</div><div class="empty-sub">'+(q?'Try a different search':'Tap + Add to add a tender')+'</div></div>';
    return;
  }

  list.innerHTML = filtered.map(t => {
    const le = latestEntry(t);
    const expanded = expandedCards.has(t.id);
    const entriesFiltered = activeFilter === 'all' ? (t.entries||[]) : (t.entries||[]).filter(e=>e.status===activeFilter);

    // Build per-vendor summary: each unique vendor on its own line with their latest amount + status
    const vendorMap = {};
    (t.entries||[]).forEach(e => {
      if(!e.vendor) return;
      // Keep the last entry per vendor (most recent)
      vendorMap[e.vendor] = e;
    });
    const vendorRows = Object.values(vendorMap);

    // Amount to show in header = latest entry's amount (not a sum)
    const headerAmount = le ? le.amount : null;
    const statusToShow = le ? le.status : null;

    // Build stacked vendor lines HTML
    const vendorHtml = vendorRows.length
      ? vendorRows.map(e =>
          `<div class="emd-vendor-row">` +
            `<span class="emd-vendor-name">${esc(e.vendor)}</span>` +
            `<span class="emd-vendor-amt">${fmtAmount(e.amount)}</span>` +
            `<span class="emd-status ${e.status}" style="font-size:9px;padding:2px 7px;">${statusLabel(e.status)}</span>` +
          `</div>`
        ).join('')
      : `<div class="emd-vendor" style="color:var(--dim);font-style:italic">No entries yet</div>`;

    return `<div class="emd-card${expanded?' expanded':''}" id="card-${t.id}">
      <div class="emd-card-header" onclick="toggleCard('${t.id}')">
        <div style="flex:1;min-width:0;">
          <div class="emd-no">${esc(t.no)}</div>
          ${vendorHtml}
        </div>
        <div class="emd-chevron">▾</div>
      </div>
      ${expanded ? `
      <div class="emd-history">
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="emd-history-title" style="flex:1">EMD History (${entriesFiltered.length})</div>
          <div onclick="openEditTender('${t.id}')" style="font-size:10px;font-family:var(--mono);color:var(--dim);cursor:pointer;padding:2px 8px;border:1px solid var(--border2);border-radius:6px;">Edit No.</div>
          <div onclick="deleteTender('${t.id}')" style="font-size:10px;font-family:var(--mono);color:#f87171;cursor:pointer;padding:2px 8px;border:1px solid rgba(239,68,68,.3);border-radius:6px;">Delete</div>
        </div>
        ${entriesFiltered.map(e => `
          <div class="emd-entry" onclick="openEditEntry('${t.id}','${e.id}')">
            <div class="emd-entry-row">
              <div class="emd-entry-amount">${fmtAmount(e.amount)}</div>
              <div class="emd-status ${e.status}" style="font-size:9px;padding:2px 8px;">${statusLabel(e.status)}</div>
              <div class="emd-entry-date">${fmtDate(e.date)}</div>
            </div>
            ${e.vendor ? `<div style="font-size:11px;font-family:var(--mono);color:var(--dim);">${esc(e.vendor)}</div>` : ''}
            ${e.notes ? `<div class="emd-entry-notes">${esc(e.notes)}</div>` : ''}
          </div>`).join('')}
        ${entriesFiltered.length===0 ? '<div style="font-size:12px;color:var(--dim);padding:8px 0;">No entries match this filter</div>' : ''}
        <button class="emd-add-entry" onclick="openAddEntry('${t.id}')">＋ Add EMD Entry</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

function toggleCard(id){
  if(expandedCards.has(id)) expandedCards.delete(id);
  else expandedCards.add(id);
  render();
}

// ── TENDER MODAL ──────────────────────────────────────
function openAddTender(){
  editingTenderId = null;
  document.getElementById('tender-modal-title').textContent = 'Add Tender';
  document.getElementById('f-no').value = '';
  openM('modal-tender');
  setTimeout(()=>document.getElementById('f-no').focus(),300);
}
function openEditTender(id){
  const t = tenders.find(x=>x.id===id);
  if(!t) return;
  editingTenderId = id;
  document.getElementById('tender-modal-title').textContent = 'Edit Tender';
  document.getElementById('f-no').value = t.no;
  openM('modal-tender');
}
function saveTender(){
  const no = document.getElementById('f-no').value.trim();
  if(!no){ toast('Enter tender number', true); return; }
  if(editingTenderId){
    const t = tenders.find(x=>x.id===editingTenderId);
    if(t) t.no = no;
  } else {
    tenders.push({id:uid(), no, entries:[]});
  }
  save(); render(); closeM('modal-tender');
  toast(editingTenderId ? 'Tender updated ✓' : 'Tender added ✓');
}
function deleteTender(id){
  const t = tenders.find(x=>x.id===id);
  if(!t) return;
  // Show inline confirmation inside the card
  const card = document.getElementById('card-'+id);
  if(!card) return;
  const existing = card.querySelector('.del-confirm');
  if(existing){ existing.remove(); return; }
  const div = document.createElement('div');
  div.className = 'del-confirm';
  div.style.cssText = 'padding:10px 14px 12px;border-top:1px solid rgba(239,68,68,.25);display:flex;align-items:center;gap:10px;';
  div.innerHTML = `<span style="font-size:12px;color:#f87171;flex:1;font-family:var(--sans)">Delete "${t.no}" and all entries?</span>
    <button onclick="confirmDeleteTender('${id}')" style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:8px;padding:6px 14px;color:#f87171;font-size:12px;font-weight:600;cursor:pointer;">Yes, Delete</button>
    <button onclick="this.parentNode.remove()" style="background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:6px 12px;color:var(--dim);font-size:12px;cursor:pointer;">Cancel</button>`;
  card.appendChild(div);
}
function confirmDeleteTender(id){
  tenders = tenders.filter(t=>t.id!==id);
  expandedCards.delete(id);
  save(); render();
  toast('Tender deleted');
  syncPush();
}

// ── ENTRY MODAL ───────────────────────────────────────
function openAddEntry(tenderId){
  editingEntryTenderId = tenderId;
  editingEntryId = null;
  document.getElementById('entry-modal-title').textContent = 'Add EMD Entry';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-vendor').value = '';
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-notes').value = '';
  document.getElementById('entry-del-btn').style.display = 'none';
  selectStatus('submitted');
  openM('modal-entry');
  setTimeout(()=>document.getElementById('f-amount').focus(),300);
}
function openEditEntry(tenderId, entryId){
  const t = tenders.find(x=>x.id===tenderId);
  if(!t) return;
  const e = t.entries.find(x=>x.id===entryId);
  if(!e) return;
  editingEntryTenderId = tenderId;
  editingEntryId = entryId;
  document.getElementById('entry-modal-title').textContent = 'Edit EMD Entry';
  document.getElementById('f-amount').value = e.amount||'';
  document.getElementById('f-vendor').value = e.vendor||'';
  document.getElementById('f-date').value = e.date||'';
  document.getElementById('f-notes').value = e.notes||'';
  document.getElementById('entry-del-btn').style.display = '';
  selectStatus(e.status||'submitted');
  openM('modal-entry');
}
function selectStatus(val){
  selectedStatus = val;
  document.querySelectorAll('.sopt').forEach(el => {
    el.className = 'sopt' + (el.dataset.val===val ? ' active-'+val : '');
  });
}
function saveEntry(){
  const amount = document.getElementById('f-amount').value.trim();
  const vendor = document.getElementById('f-vendor').value.trim();
  const date   = document.getElementById('f-date').value;
  const notes  = document.getElementById('f-notes').value.trim();
  if(!amount){ toast('Enter amount', true); return; }
  const t = tenders.find(x=>x.id===editingEntryTenderId);
  if(!t) return;
  if(editingEntryId){
    const e = t.entries.find(x=>x.id===editingEntryId);
    if(e){ e.amount=amount; e.vendor=vendor; e.date=date; e.status=selectedStatus; e.notes=notes; }
  } else {
    t.entries.push({id:uid(), amount, vendor, date, status:selectedStatus, notes});
  }
  save(); render(); closeM('modal-entry');
  toast(editingEntryId ? 'Entry updated ✓' : 'EMD entry added ✓');
  syncPush();
}
function deleteEntry(){
  // Use a two-tap confirmation — first tap arms it, second tap fires
  const btn = document.getElementById('entry-del-btn');
  if(btn.dataset.armed === '1'){
    const t = tenders.find(x=>x.id===editingEntryTenderId);
    if(t) t.entries = t.entries.filter(e=>e.id!==editingEntryId);
    save(); render(); closeM('modal-entry');
    toast('Entry deleted');
    syncPush();
  } else {
    btn.dataset.armed = '1';
    btn.textContent = 'Tap again to confirm';
    setTimeout(()=>{ btn.dataset.armed='0'; btn.textContent='Delete'; }, 2500);
  }
}

// ── MODAL HELPERS ─────────────────────────────────────
function openM(id){ document.getElementById(id).classList.add('open'); }
function closeM(id){ document.getElementById(id).classList.remove('open'); }

// ── TOAST ─────────────────────────────────────────────
let _tt; function toast(msg, err){
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (err?' err':'');
  clearTimeout(_tt); _tt = setTimeout(()=>el.className='toast',2800);
}

// ── SYNC ──────────────────────────────────────────────
function setSyncDot(state){
  const dot = document.getElementById('sync-dot');
  const btn = document.getElementById('btn-sync');
  dot.className = 'sync-dot' + (state?' '+state:'');
  btn.className = 'btn-sync' + (syncUrl&&state==='ok'?' ok':'');
}
function openSync(){
  const body = document.getElementById('sync-body');
  const configured = !!syncUrl;
  const script = APPS_SCRIPT;
  body.innerHTML = `
    ${configured
      ? `<div class="sync-url-box" onclick="copyUrl()" title="Tap to copy">${syncUrl}</div>
         <button class="btn-push" onclick="syncPush()">⬆ Push to Cloud</button>
         <button class="btn-pull" onclick="syncPull()">⬇ Pull from Cloud</button>
         <div style="text-align:center;margin-bottom:14px;">
           <span style="font-size:11px;color:var(--dim);font-family:var(--mono)">Last sync: ${lastSyncText()}</span>
         </div>
         <button class="btn-c" onclick="changeSyncUrl()" style="width:100%;text-align:center">Change URL</button>`
      : `<p style="font-size:13px;color:var(--dim);margin-bottom:16px;line-height:1.6;">
           Set up a separate Google Sheet for EMD data with its own Apps Script.
         </p>
         <div class="sync-step"><div class="sync-step-num">1</div><div class="sync-step-body">Create a new Google Sheet → Extensions → Apps Script → delete existing code</div></div>
         <div class="sync-step"><div class="sync-step-num">2</div><div class="sync-step-body">Copy the script below and paste it in Apps Script</div></div>
         <div class="sync-url-box" id="script-box" style="font-size:10px;max-height:120px;overflow-y:auto;margin-bottom:6px;">${script.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
         <button onclick="copyScript()" style="width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:9px;color:var(--dim);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:14px;">📋 Copy Script</button>
         <div class="sync-step"><div class="sync-step-num">3</div><div class="sync-step-body">Click Deploy → New deployment → Web app → Execute as: Me → Access: Anyone → Deploy → Authorize</div></div>
         <div class="sync-step"><div class="sync-step-num">4</div><div class="sync-step-body">Copy the Web App URL and paste below</div></div>
         <input class="fi" id="sync-url-input" placeholder="https://script.google.com/macros/s/…/exec" style="margin-bottom:12px;">
         <button class="btn-s" onclick="saveSyncUrl()" style="width:100%">Save URL</button>`
    }`;
  openM('modal-sync');
}
function lastSyncText(){
  const ts = localStorage.getItem('emd_last_sync');
  if(!ts) return 'never';
  const diff = Math.round((Date.now()-parseInt(ts))/60000);
  if(diff < 1) return 'just now';
  if(diff < 60) return diff+'m ago';
  return Math.round(diff/60)+'h ago';
}
function copyScript(){
  navigator.clipboard.writeText(APPS_SCRIPT).then(()=>toast('Script copied ✓')).catch(()=>{
    const box = document.getElementById('script-box');
    if(box){ const r=document.createRange(); r.selectNode(box); window.getSelection().removeAllRanges(); window.getSelection().addRange(r); }
    toast('Select all and copy manually');
  });
}
function copyUrl(){
  navigator.clipboard.writeText(syncUrl).then(()=>toast('URL copied ✓')).catch(()=>{});
}
function changeSyncUrl(){
  closeM('modal-sync');
  syncUrl = '';
  localStorage.removeItem(SYNC_KEY);
  setSyncDot('');
  setTimeout(openSync, 300);
}
function saveSyncUrl(){
  const val = (document.getElementById('sync-url-input').value||'').trim();
  if(!val || !val.startsWith('http')){ toast('Enter a valid URL', true); return; }
  syncUrl = val;
  localStorage.setItem(SYNC_KEY, syncUrl);
  setSyncDot('ok');
  closeM('modal-sync');
  toast('Sync URL saved ✓');
}

// ── JSONP ─────────────────────────────────────────────
function jsonp(url, cbName, timeout){
  return new Promise(function(resolve, reject){
    const id = cbName || ('_emd_cb_' + Date.now());
    let done = false;
    const timer = setTimeout(function(){
      if(done) return; done = true;
      delete window[id];
      const s = document.getElementById('_jsonp_'+id);
      if(s && s.parentNode) s.parentNode.removeChild(s);
      reject(new Error('timeout'));
    }, timeout || 15000);
    window[id] = function(data){
      if(done) return; done = true;
      clearTimeout(timer);
      delete window[id];
      const s = document.getElementById('_jsonp_'+id);
      if(s && s.parentNode) s.parentNode.removeChild(s);
      resolve(data);
    };
    const old = document.getElementById('_jsonp_'+id);
    if(old && old.parentNode) old.parentNode.removeChild(old);
    const script = document.createElement('script');
    script.id = '_jsonp_' + id;
    script.onerror = function(){
      if(done) return; done = true;
      clearTimeout(timer); delete window[id];
      const s = document.getElementById('_jsonp_'+id);
      if(s && s.parentNode) s.parentNode.removeChild(s);
      reject(new Error('script error'));
    };
    script.src = url + (url.includes('?') ? '&' : '?') + 'cb=' + id;
    document.body.appendChild(script);
  });
}

// ── SYNC PUSH (chunked) ───────────────────────────────
async function syncPush(){
  if(!syncUrl) return;
  setSyncDot('busy');
  try{
    const full = JSON.stringify(tenders);
    const CHUNK = 1500; // keep small so encodeURIComponent stays under Apps Script URL limit
    const chunks = [];
    for(let i = 0; i < full.length; i += CHUNK) chunks.push(full.slice(i, i+CHUNK));
    const total = chunks.length;
    const pushId = Date.now();
    for(let i = 0; i < total; i++){
      const d = encodeURIComponent(chunks[i]);
      await jsonp(syncUrl+'?action=chunk&i='+i+'&total='+total+'&d='+d, '_emd_chunk_'+pushId+'_'+i);
    }
    await jsonp(syncUrl+'?action=commit', '_emd_commit_'+pushId);
    localStorage.setItem('emd_last_sync', Date.now().toString());
    setSyncDot('ok'); toast('Synced to cloud ✓');
  } catch(e){
    setSyncDot('err'); toast('Push failed — check URL', true);
    console.warn('EMD sync push error:', e.message);
  }
}

// ── SYNC PULL ─────────────────────────────────────────
async function syncPull(){
  if(!syncUrl) return;
  setSyncDot('busy');
  try{
    const remote = await jsonp(syncUrl+'?action=read', '_emd_pull_'+Date.now());
    const arr = Array.isArray(remote) ? remote : null;
    if(arr && arr.length > 0){
      tenders = arr;
      save(); render();
      localStorage.setItem('emd_last_sync', Date.now().toString());
      setSyncDot('ok'); toast('Pulled from cloud ✓');
    } else {
      setSyncDot('ok'); toast('Nothing to pull');
    }
  } catch(e){
    setSyncDot('err'); toast('Pull failed — check URL', true);
    console.warn('EMD sync pull error:', e);
  }
}

// ── EXPORT TO EXCEL ───────────────────────────────────
function exportExcel(){
  if(!tenders.length){ toast('No data to export', true); return; }

  // Build CSV rows
  const rows = [['Tender No','Vendor','Amount (INR)','Date','Status','Notes']];
  tenders.forEach(t => {
    if(!t.entries || !t.entries.length){
      rows.push([t.no, '', '', '', '', '']);
    } else {
      t.entries.forEach(e => {
        rows.push([
          t.no,
          e.vendor || '',
          e.amount || '',
          e.date || '',
          e.status === 'refund-pending' ? 'Refund Pending' :
            e.status === 'refunded' ? 'Refunded' : 'Submitted',
          e.notes || ''
        ]);
      });
    }
  });

  // Escape CSV cells
  const csv = rows.map(r =>
    r.map(c => {
      const s = String(c).replace(/"/g,'""');
      return /[,"\n]/.test(s) ? `"${s}"` : s;
    }).join(',')
  ).join('\r\n');

  // Add BOM for Excel to correctly read UTF-8 (handles ₹ and other chars)
  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `EMDTrack-${date}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Exported to Excel ✓');
}

// ── INIT ──────────────────────────────────────────────
load();
if(syncUrl){ setSyncDot('ok'); syncPull(); }
</script>
